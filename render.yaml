services:
  - type: web
    name: goevoli-backend
    runtime: docker
    repo: https://github.com/ngbui101/GoEvoli
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: APP_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: MONGO_DATABASE
        value: goevoli
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: COOKIE_NAME
        value: goevoli_session
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: None
